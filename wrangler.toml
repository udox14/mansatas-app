name = "mansatas-app"
main = "worker-entry.ts"
minify = true
account_id = "89389959c60ad166fb81698c4289aab0"

compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "STATIC_ASSETS"

# KV untuk incremental cache Next.js
[[kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "d71a11d5f8ec47318b96e52f52715749"

# D1 Database — MAN 1 Tasikmalaya
[[d1_databases]]
binding = "DB"
database_name = "mansatas-db"
database_id = "76b7b346-3f3f-4c1e-a347-2d51497bad97"

# R2 Storage — foto siswa, avatar, bukti pelanggaran, dokumen surat
[[r2_buckets]]
binding = "R2"
bucket_name = "mansatas-storage"

# Browser Rendering — HTML→PDF server-side (cetak konsisten hape+desktop)
# Butuh Workers Paid plan ($5/mo) diaktifkan di dashboard Cloudflare.
[browser]
binding = "BROWSER"

[vars]
BETTER_AUTH_URL = "https://mansatas-app.drudox.workers.dev"
R2_PUBLIC_URL = "https://pub-84873e7206c44c4ba6e4aa405b6a8192.r2.dev"
NEXT_PUBLIC_VAPID_PUBLIC_KEY = "BG7sMarahv_R_wuzNUqUpCTEs38OCkK-wX5or0DzWKc4c0G1SlXNiVUMc1h0Rn8aLdhzCfC5y4SWY6MHGCUvmBk"
VAPID_SUBJECT = "mailto:admin@man1tasikmalaya.sch.id"
# Set private values with Cloudflare secrets, not committed vars:
# wrangler secret put CRON_SECRET
# wrangler secret put VAPID_PRIVATE_KEY
# wrangler secret put BETTER_AUTH_SECRET
# wrangler secret put WHATSAPP_ACCESS_TOKEN
# wrangler secret put WHATSAPP_PHONE_NUMBER_ID
# wrangler secret put WHATSAPP_VERIFY_TOKEN
# wrangler secret put WHATSAPP_APP_SECRET
# Default provider sekarang WABLAS:
# wrangler secret put WHATSAPP_PROVIDER       # isi: wablas
# wrangler secret put WABLAS_BASE_URL         # contoh: https://texas.wablas.com
# wrangler secret put WABLAS_TOKEN
# wrangler secret put WABLAS_SECRET_KEY

[triggers]
crons = ["* * * * *"] # Setiap menit — handler cek jadwal_notifikasi di DB

# Stub @vercel/og — tidak dipakai di app ini, tapi Next.js meng-include-nya.
# Mengganti index.edge.js dengan stub kosong agar resvg.wasm (1.3 MB)
# dan yoga.wasm (70 KB) tidak ikut masuk ke worker bundle.
[alias]
"next/dist/compiled/@vercel/og/index.edge.js" = "./stubs/og-stub.js"
